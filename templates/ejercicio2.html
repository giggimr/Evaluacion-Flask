{% extends "base.html" %}

{% block titulo %}Ejercicio 2{% endblock %}

{% block contenido %}
<div class="tarjeta">
    <h2>Ejercicio 2: Nombre más largo</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('ejercicio2') }}">
        <label for="nombre1">Nombre 1</label>
        <input type="text" id="nombre1" name="nombre1" required>

        <label for="nombre2">Nombre 2</label>
        <input type="text" id="nombre2" name="nombre2" required>

        <label for="nombre3">Nombre 3</label>
        <input type="text" id="nombre3" name="nombre3" required>

        <button type="submit" class="boton">Enviar</button>
    </form>

    <a class="volver" href="{{ url_for('index') }}">Volver al menú</a>
</div>
{% endblock %}
